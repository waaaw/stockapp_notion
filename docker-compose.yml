# 라즈베리파이 등 상시 리눅스 환경에서 실행하기 위한 구성.
# web: gunicorn으로 웹 UI 서빙. scheduler: 기존 scripts/run_daily_update.py를 그대로 재사용해
# 매일 16:00(KST) daily-update를 실행한다(Windows 작업 스케줄러의 대체).
services:
  web:
    build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs

  scheduler:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    command: ["python", "scripts/run_daily_update.py"]
